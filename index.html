<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Amphibian Observations</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="info">
<h2>Amphibian observations</h2>
<p>
Example visualization of amphibian observations based on open biodiversity data.
Each point represents a recorded observation.
</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([51.3,10.1],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

fetch("amphibians.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
onEachFeature:(feature,layer)=>{
layer.bindPopup(
"<b>"+feature.properties.species+"</b><br>"+feature.properties.year
)
}
}).addTo(map)

})

</script>

</body>
</html>
