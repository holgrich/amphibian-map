<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Amphibian Observations</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#info {
position:absolute;
top:20px;
left:20px;
background:white;
padding:12px 16px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
max-width:260px;
font-size:14px;
z-index:1000;
}
</style>
</head>

<body>

<div id="info">
<h2>Amphibian observations</h2>
<p>
Example visualization of amphibian observations based on open biodiversity data.
Each point represents a recorded observation.
</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([51.3,10.1],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

fetch("amphibians.geojson")
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
onEachFeature:(feature,layer)=>{
layer.bindPopup(
"<b>"+feature.properties.species+"</b><br>"+feature.properties.year
)
}
}).addTo(map)

})

</script>

</body>
</html>
